<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <!-- Link Style -->
    <link href="../src/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">


    <!-- SEO tags -->
    <title>UniFind</title>
    <meta name="description"
        content="Find the best educational institutions in Cambodia with our comprehensive directory.">
    <meta name="keywords"
        content="education directory, Cambodia, schools, universities, colleges, educational institutions, find schools, find universities, find colleges, education resources">
    <meta name="author" content="Maiy Leangngim">
    <link rel="icon" type="image/x-icon" href="../assets/images/unifind_icon_only.png">


    <!-- Open Graph -->
    <meta property="og:title" content="Education Directory-UniFind">
    <meta property="og:description"
        content="Find the best educational institutions in Cambodia with our comprehensive directory.">
    <meta property="og:image" content="../assets/images/unifind_logo.png">
    <meta property="og:url" content="https://uniFind.com" />
    <meta property="og:type" content="website">
</head>

<body class="bg-gray-200 dark:bg-gray-950 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white dark:bg-gray-900 rounded-xl shadow-md p-8">

    <!-- Logo / Title -->
    <div class="text-center mb-6">

      <!-- logo -->
            <div class="logo flex">
                <a href="../index.html">
                    <img class="hidden dark:block h-10 md:h-17 w-auto object-contain"
                        src="../assets/images/unifind_icon_wordmark_white.png" alt="UniFind Logo">
                    <img class="block dark:hidden h-10 md:h-17 w-auto object-contain"
                        src="../assets/images/unifind_icon_wordmark.png" alt="UniFind Logo">
                </a>
            </div>

      <p class="text-md text-gray-500 dark:text-gray-400 mt-2">
        Create your account
      </p>
    </div>

    <!-- Form -->
    <form class="space-y-4">

      <!-- Name -->
      <div>
        <label class="text-sm text-gray-700 dark:text-gray-300">Full Name</label>
        <input type="text" placeholder="Enter your name..."
          class="w-full mt-1 px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 
          bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-200
          focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>

      <!-- Email -->
      <div>
        <label class="text-sm text-gray-700 dark:text-gray-300">Email</label>
        <input type="email" placeholder="your@gmail.com..."
          class="w-full mt-1 px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 
          bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-200
          focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>

      <!-- Password -->
      <div>
        <label class="text-sm text-gray-700 dark:text-gray-300">Password</label>
        <input type="password" placeholder="your password..."
          class="w-full mt-1 px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 
          bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-200
          focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="text-sm text-gray-700 dark:text-gray-300">Confirm Password</label>
        <input type="password" placeholder="your confirm password..."
          class="w-full mt-1 px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 
          bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-200
          focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>

      <!-- Terms -->
      <div class="flex items-start gap-2 text-sm text-gray-600 dark:text-gray-400">
        <input type="checkbox" class="mt-1">
        <span>
          I agree to the
          <a href="#" class="text-indigo-600 hover:underline">Terms</a>
          and
          <a href="#" class="text-indigo-600 hover:underline">Privacy Policy</a>
        </span>
      </div>

      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg transition">
        Create Account
      </button>

    </form>

    <!-- Divider -->
    <div class="my-6 flex items-center gap-3">
      <div class="h-px bg-gray-300 dark:bg-gray-700 w-full"></div>
      <span class="text-xs text-gray-500">or</span>
      <div class="h-px bg-gray-300 dark:bg-gray-700 w-full"></div>
    </div>

    <!-- Google -->
    <button
      class="w-full flex items-center justify-center gap-2 border border-gray-300 dark:border-gray-700 
      py-2 rounded-lg hover:bg-gray-50 dark:text-gray-100 dark:hover:bg-gray-800 transition">

      <img
        src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Google_Favicon_2025.svg/250px-Google_Favicon_2025.svg.png"
        class="w-[22px] h-[22px] object-cover rounded-full">

      Sign up with Google
    </button>

    <!-- Login link -->
    <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
      Already have an account?
      <a href="./logIn.html" class="text-indigo-600 hover:underline">Login</a>
    </p>

  </div>

          <script src="../js/theme-mode.js"></script>


</body>
</html>
