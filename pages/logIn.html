<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <!-- Link Style -->
    <link href="../src/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">


    <!-- SEO tags -->
    <title>UniFind</title>
    <meta name="description"
        content="Find the best educational institutions in Cambodia with our comprehensive directory.">
    <meta name="keywords"
        content="education directory, Cambodia, schools, universities, colleges, educational institutions, find schools, find universities, find colleges, education resources">
    <meta name="author" content="Maiy Leangngim">
    <link rel="icon" type="image/x-icon" href="../assets/images/unifind_icon_only.png">


    <!-- Open Graph -->
    <meta property="og:title" content="Education Directory-UniFind">
    <meta property="og:description"
        content="Find the best educational institutions in Cambodia with our comprehensive directory.">
    <meta property="og:image" content="../assets/images/unifind_logo.png">
    <meta property="og:url" content="https://uniFind.com" />
    <meta property="og:type" content="website">
</head>

<body class="bg-gray-200 dark:bg-gray-950 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md bg-white dark:bg-gray-900 rounded-xl shadow-md p-8">

        <!-- Logo / Title -->
        <div class="text-center mb-6">
                        <!-- logo -->
            <div class="logo flex">
                <a href="../index.html">
                    <img class="hidden dark:block h-10 md:h-17 w-auto object-contain"
                        src="../assets/images/unifind_icon_wordmark_white.png" alt="UniFind Logo">
                    <img class="block dark:hidden h-10 md:h-17 w-auto object-contain"
                        src="../assets/images/unifind_icon_wordmark.png" alt="UniFind Logo">
                </a>
            </div>
            <p class="text-md text-gray-500 dark:text-gray-400">
                Welcome back
            </p>
        </div>

        <!-- Form -->
        <form class="space-y-4">

            <!-- Email -->
            <div>
                <label class="text-sm text-gray-700 dark:text-gray-300">Email</label>
                <input type="email" placeholder="your@example.com" class="w-full mt-1 px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 
          bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-200
          focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <!-- Password -->
            <div>
                <label class="text-sm text-gray-700 dark:text-gray-300">Password</label>
                <input type="password" placeholder="••••••••" class="w-full mt-1 px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 
          bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-200
          focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 text-gray-600 dark:text-gray-400">
                    <input type="checkbox">
                    Remember me
                </label>

                <a href="#" class="text-indigo-600 hover:underline">
                    Forgot password?
                </a>
            </div>

            <!-- Button -->
            <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-lg transition">
                Login
            </button>

        </form>

        <!-- Divider -->
        <div class="my-6 flex items-center gap-3">
            <div class="h-px bg-gray-300 dark:bg-gray-700 w-full"></div>
            <span class="text-xs text-gray-500">or</span>
            <div class="h-px bg-gray-300 dark:bg-gray-700 w-full"></div>
        </div>

        <!-- Social Login -->
        <button class="w-full flex items-center justify-center gap-2 border border-gray-300 dark:border-gray-700 
      py-2 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800 transition dark:text-gray-100">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Google_Favicon_2025.svg/250px-Google_Favicon_2025.svg.png"
                    class="rounded-full w-[25px] h-[25px] object-cover">
            Continue with Google
        </button>

        <!-- Sign up -->
        <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
            Don't have an account?
            <a href="./signUp.html" class="text-indigo-600 hover:underline">Sign up</a>
        </p>

    </div>

        <script src="../js/theme-mode.js"></script>

</body>
</html>
